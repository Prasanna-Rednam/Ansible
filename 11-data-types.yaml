- name: demo on data-types
  hosts: local
  connection: local
  vars:
    PROGRAM: "DevSecOps with AWS" #string
    DURATION: 140 #integer
    IS_LIVE: true #bool
    DETAILS: #map/dictionary
      MONTHS: 4
      TRAINER:  "Siva"
    TOPICS: # list -/[]
    - linux
    - shell
    - Ansible
    ADVANTAGES:
    [
      upskill,
      shift,
      increment
    ]
    tasks:
    - name: print the DETAILS
    ansible.builtin.debug:
      msg: "printing variables program: {{PROGRAM}} DURATION: {{DURATION}} IS_LIVE: {{IS_LIVE}} DETAILS: {{DETAILS}} TOPICS: {{TOPICS}} ADVANTAGES: {{ADVANTAGES}}"