- name: demo on filters
  hosts: local
  connection: local
  vars: 
    topics: linux, shell, ansible, terraform

    tagsMap:
      name: ansible
      project: roboshop
      component: catalogue
    
    tagsList:
    [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]


  tasks:
  - name: gretting
    ansible.builtin.debug:
      msg: "Hi prasanna, {{GRETTING | default('good morning')}}"
    
  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',')}}"

  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: list string to dic
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict }}"