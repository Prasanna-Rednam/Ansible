- name: demo on filters
  hosts: local
  connection: local
  vars: 
    topics: linux, shell, ansible, terraform

    tag:
      name: ansible
      project: roboshop
      component: catalogue

  tasks:
  - name: gretting
    ansible.builtin.debug:
      msg: "Hi prasanna, {{GRETTING | default('good morning')}}"
    
  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',')}}"

  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ tags | dict2items }}"